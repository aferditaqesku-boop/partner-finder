        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .search-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .search-input-wrapper {
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #667eea;
        }
        
        .search-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
        }
        
        .search-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .examples {
            margin-top: 15px;
        }
        
        .examples-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }
        
        .example-btn {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .results-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .result-item {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .result-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .partner-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }
        
        .score-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .score-high {
            background: #10b981;
            color: white;
        }
        
        .score-medium {
            background: #f59e0b;
            color: white;
        }
        
        .score-low {
            background: #ef4444;
            color: white;
        }
        
        .reasons-list {
            list-style: none;
            margin-bottom: 15px;
        }
        
        .reason-item {
            padding: 8px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
        
        .reason-item.positive {
            color: #10b981;
        }
        
        .reason-item.negative {
            color: #ef4444;
        }
        
        .reason-item.neutral {
            color: #6b7280;
        }
        
        .reason-icon {
            margin-right: 8px;
            font-weight: bold;
        }
        
        .details-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .details-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }
        
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            padding: 4px 10px;
            background: #f3f4f6;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #4b5563;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1rem;
        }
        
        .error {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>

        function PartnerFinder() {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            const exampleQueries = [
                "which CMS partner has on prem offering and can support Sharepoint in MEA region?",
                "partners with retail focus in Europe",
                "who supports corporate communications in APAC?",
                "CMS with banking experience and US presence"
            ];

            const parseQuery = (queryText) => {
                const lower = queryText.toLowerCase();
                const filters = {
                    features: [],
                    regions: [],
                    verticals: []
                };

                // Feature detection
                if (lower.includes('on-prem') || lower.includes('on prem')) {
                    filters.features.push('On Prem');
                }
                if (lower.includes('sharepoint') || lower.includes('share point')) {
                    filters.features.push('Web - Sharepoint');
                    filters.features.push('Sharepoint');
                }
                if (lower.includes('remote firmware')) {
                    filters.features.push('Remote Firmware updates');
                }
                if (lower.includes('multizone')) {
                    filters.features.push('Multizone Media Playback');
                }

                // Region detection
                const regions = ['Europe', 'MEA', 'APAC', 'ANZ', 'US', 'India'];
                regions.forEach(region => {
                    if (lower.includes(region.toLowerCase())) {
                        filters.regions.push(region);
                    }
                });

                // Vertical detection
                const verticals = [
                    { keywords: ['retail', 'store'], name: 'Retail' },
                    { keywords: ['corporate', 'enterprise', 'workplace'], name: 'Corporate' },
                    { keywords: ['bank', 'banking', 'financial'], name: 'Banking' },
                    { keywords: ['qsr', 'restaurant', 'c-store'], name: 'QSR/C-store' },
                    { keywords: ['hospital', 'healthcare', 'medical'], name: 'Healthcare' },
                    { keywords: ['education', 'university', 'school'], name: 'Education' },
                    { keywords: ['transport', 'airport', 'transit'], name: 'Transportation' },
                    { keywords: ['advertising', 'dooh', 'ad network'], name: 'Advertising' }
                ];

                verticals.forEach(vertical => {
                    if (vertical.keywords.some(kw => lower.includes(kw))) {
                        filters.verticals.push({ name: vertical.name, minThreshold: 0.1 });
                    }
                });

                return filters;
            };

            const scorePartner = (partner, filters) => {
                let score = 0;
                let maxScore = 0;
                const reasons = [];

                // Feature scoring (30 points per required feature)
                filters.features.forEach(feature => {
                    maxScore += 30;
                    const hasFeature = Object.keys(partner.features).some(key => 
                        key.toLowerCase().includes(feature.toLowerCase()) && 
                        partner.features[key] === true
                    );
                    
                    if (hasFeature) {
                        score += 30;
                        reasons.push({ text: `Has ${feature}`, type: 'positive' });
                    } else {
                        reasons.push({ text: `Missing ${feature}`, type: 'negative' });
                    }
                });

                // Region scoring (20 points per required region)
                filters.regions.forEach(region => {
                    maxScore += 20;
                    if (partner.regions.includes(region)) {
                        score += 20;
                        reasons.push({ text: `Covers ${region}`, type: 'positive' });
                    } else {
                        reasons.push({ text: `No ${region} presence`, type: 'negative' });
                    }
                });

                // Vertical scoring (20 points per vertical, scaled by percentage)
                filters.verticals.forEach(vertical => {
                    maxScore += 20;
                    const verticalStrength = partner.verticals[vertical.name] || 0;
                    if (verticalStrength >= vertical.minThreshold) {
                        const points = Math.floor(verticalStrength * 20);
                        score += points;
                        reasons.push({ 
                            text: `${vertical.name}: ${(verticalStrength * 100).toFixed(0)}% focus`, 
                            type: 'positive' 
                        });
                    } else if (verticalStrength > 0) {
                        reasons.push({ 
                            text: `${vertical.name}: only ${(verticalStrength * 100).toFixed(0)}% focus`, 
                            type: 'neutral' 
                        });
                    }
                });

                // Calculate percentage score
                const percentageScore = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;

                return {
                    partner: partner.name,
                    score: percentageScore,
                    reasons,
                    verticals: partner.verticals,
                    regions: partner.regions
                };
            };

            const handleSearch = () => {
                if (!query.trim()) return;

                setIsLoading(true);
                setError(null);

                try {
                    const filters = parseQuery(query);
                    
                    // Score all partners
                    const scoredPartners = PARTNER_DATA.partners
                        .map(partner => scorePartner(partner, filters))
                        .filter(result => result.score > 0) // Only show partners with some match
                        .sort((a, b) => b.score - a.score);

                    setResults({
                        query,
                        filters,
                        partners: scoredPartners
                    });
                } catch (err) {
                    setError('Error processing query. Please try again.');
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleExampleClick = (example) => {
                setQuery(example);
                setTimeout(() => {
                    handleSearch();
                }, 100);
            };

            const getScoreClass = (score) => {
                if (score >= 70) return 'score-high';
                if (score >= 40) return 'score-medium';
                return 'score-low';
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🔍 BrightSign Partner Finder</h1>
                        <p>Search {PARTNER_DATA.partners.length} CMS partners by capability, region, and vertical</p>
                    </div>

                    <div className="search-card">
                        <div className="search-input-wrapper">
                            <input
                                type="text"
                                className="search-input"
                                placeholder="Ask a question... e.g., 'which partners have on-prem and support SharePoint in MEA?'"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                            />
                        </div>
                        
                        <button 
                            className="search-btn" 
                            onClick={handleSearch}
                            disabled={!query.trim() || isLoading}
                        >
                            {isLoading ? 'Searching...' : 'Search Partners'}
                        </button>

                        <div className="examples">
                            <div className="examples-title">Try these examples:</div>
                            {exampleQueries.map((example, idx) => (
                                <span
                                    key={idx}
                                    className="example-btn"
                                    onClick={() => handleExampleClick(example)}
                                >
                                    {example}
                                </span>
                            ))}
                        </div>
                    </div>

                    {error && (
                        <div className="error">{error}</div>
                    )}

                    {isLoading && (
                        <div className="loading">
                            Searching through partner database...
                        </div>
                    )}

                    {results && !isLoading && (
                        <div className="results-card">
                            <h2 style={{marginBottom: '20px', color: '#333'}}>
                                Found {results.partners.length} matching partners
                            </h2>

                            {results.partners.length === 0 ? (
                                <div className="no-results">
                                    <p>No partners match all criteria. Try adjusting your search.</p>
                                </div>
                            ) : (
                                results.partners.map((result, idx) => (
                                    <div key={idx} className="result-item">
                                        <div className="result-header">
                                            <div className="partner-name">
                                                {idx + 1}. {result.partner}
                                            </div>
                                            <div className={`score-badge ${getScoreClass(result.score)}`}>
                                                {result.score}/100
                                            </div>
                                        </div>

                                        <ul className="reasons-list">
                                            {result.reasons.map((reason, ridx) => (
                                                <li key={ridx} className={`reason-item ${reason.type}`}>
                                                    <span className="reason-icon">
                                                        {reason.type === 'positive' ? '✓' : 
                                                         reason.type === 'negative' ? '✗' : '•'}
                                                    </span>
                                                    {reason.text}
                                                </li>
                                            ))}
                                        </ul>

                                        <div className="details-section">
                                            <div className="details-title">Geographic Coverage:</div>
                                            <div className="tags">
                                                {result.regions.map((region, ridx) => (
                                                    <span key={ridx} className="tag">{region}</span>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="details-section">
                                            <div className="details-title">Top Verticals:</div>
                                            <div className="tags">
                                                {Object.entries(result.verticals)
                                                    .filter(([_, val]) => val > 0)
                                                    .sort((a, b) => b[1] - a[1])
                                                    .slice(0, 5)
                                                    .map(([vertical, percentage], vidx) => (
                                                        <span key={vidx} className="tag">
                                                            {vertical}: {(percentage * 100).toFixed(0)}%
                                                        </span>
                                                    ))
                                                }
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<PartnerFinder />, document.getElementById('root'));
    </script>
</body>
</html>
